name: TEST_IA Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-ia-web-prod
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.TEST_IA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TEST_IA_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.TEST_IA_AWS_REGION }}

      - name: Build shared workspace
        run: npm --workspace @mounjaro/shared run build

      - name: Deploy TEST_IA frontend
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.TEST_IA_SERVERLESS_ACCESS_KEY }}
          SERVERLESS_LICENSE_KEY: ${{ secrets.TEST_IA_SERVERLESS_LICENSE_KEY }}
          VITE_API_URL: ${{ secrets.TEST_IA_WEB_API_URL }}
        run: npm --workspace web run deploy:aws